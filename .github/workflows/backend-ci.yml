name: Backend CI

'on':
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - '.python-version'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - '.python-version'

jobs:
  backend-checks:
    name: Install dependencies and run Django checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DEBUG: 'True'
      ENABLE_FILE_LOGGING: 'False'
      ENABLE_FORUM: 'False'
      DATABASE_URL: 'sqlite:///db.sqlite3'
      SECRET_KEY: 'ci-django-key-for-backend-checks-abcdefghijklmnopqrstuvwxyz1234567890'
      JWT_SECRET_KEY: 'ci-jwt-key-for-backend-checks-abcdefghijklmnopqrstuvwxyz1234567890-different'

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate CI-only field encryption key
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          from cryptography.fernet import Fernet

          print(f"FIELD_ENCRYPTION_KEY={Fernet.generate_key().decode()}")
          PY

      - name: Check installed dependency consistency
        run: python -m pip check

      - name: Run Django system checks
        run: python manage.py check