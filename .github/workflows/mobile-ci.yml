name: Mobile Fresh Checkout CI

'on':
  push:
    branches: [main, develop]
    paths:
      - 'plant_community_mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'plant_community_mobile/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  flutter-fresh-checkout:
    name: Flutter analyze, test, and debug build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: plant_community_mobile

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated code is current
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Ensure generated code is committed
        run: git diff --exit-code -- lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android debug APK
        run: >-
          flutter build apk --debug
          --dart-define=API_BASE_URL=http://10.0.2.2:8000/api/v1
          --dart-define=FIREBASE_API_KEY=ci-placeholder-api-key
          --dart-define=FIREBASE_ANDROID_APP_ID=1:000000000000:android:0000000000000000000000
          --dart-define=FIREBASE_MESSAGING_SENDER_ID=000000000000
          --dart-define=FIREBASE_PROJECT_ID=ci-placeholder-project
          --dart-define=FIREBASE_STORAGE_BUCKET=ci-placeholder-project.appspot.com