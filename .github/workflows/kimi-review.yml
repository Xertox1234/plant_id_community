name: kimi-review

# Server-side code-review gate. Runs the vendored kimi-review CLI over each PR
# diff with Tier B agentic verification; a verified CRITICAL finding (engine exit
# code 2) fails the check so branch protection blocks the merge. Unlike the local
# pre-commit hook, this runs for every contributor regardless of whether they have
# the kimi-review CLI installed.

on:
  pull_request:
    branches: [main]

# A newer push to the same PR cancels an in-flight review run.
concurrency:
  group: kimi-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  kimi-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so the base..HEAD diff can be computed.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install kimi-review dependencies
        # The structured-output draft + agentic verify loop need a recent SDK.
        run: pip install --quiet "openai>=1.40,<2"

      - name: Run kimi-review on the PR diff
        env:
          # kimi-review reads WORKER_API_KEY or OPENROUTER_API_KEY.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::warning::OPENROUTER_API_KEY secret is not set — kimi-review gate skipped."
            exit 0
          fi

          # Tier B agentic verify reads the working tree; under the pull_request
          # trigger that is already the PR-head checkout, so no head-sha is needed.
          if REVIEW=$(git diff "${{ github.event.pull_request.base.sha }}...HEAD" \
            | python3 scripts/kimi-review \
                --scope "PR #${{ github.event.pull_request.number }}" \
                --profile plant_id \
                --verify agentic \
                --tiers CRITICAL,WARNING 2>&1); then
            STATUS=0
          else
            STATUS=$?
          fi
          echo "$REVIEW"

          # Engine exit 2 = a CRITICAL survived verification → block the merge.
          if [ "$STATUS" -eq 2 ]; then
            echo "::error::kimi-review reported a verified CRITICAL finding — see the log above."
            exit 1
          fi
          # CI fails closed on any other tool error (the local gate fails open).
          if [ "$STATUS" -ne 0 ]; then
            echo "::error::kimi-review failed to run (exit $STATUS)."
            exit "$STATUS"
          fi
          echo "kimi-review: no CRITICAL findings."
