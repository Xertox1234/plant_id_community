name: Harness CI

# Run the harness's own test suite on every PR or push that touches the harness
# itself (.claude/hooks/, scripts/inject/, or docs/rules/).
#
# Local equivalent (run from repo root):
#   bash .claude/hooks/test-inject-patterns.sh && \
#   bash .claude/hooks/test-kimi-review.sh && \
#   bash .claude/hooks/test-guard-worktree-isolation.sh && \
#   python3 scripts/inject/test_match_triggers.py && \
#   python3 scripts/inject/test_capture_trigger.py && \
#   python3 scripts/inject/test_capture_from_review.py

'on':
  push:
    branches: [main, develop]
    paths:
      - '.claude/hooks/**'
      - 'scripts/inject/**'
      - 'docs/rules/**'
      - '.github/workflows/harness-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '.claude/hooks/**'
      - 'scripts/inject/**'
      - 'docs/rules/**'
      - '.github/workflows/harness-ci.yml'

jobs:
  harness-tests:
    name: Hook self-tests and Python inject tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Hook self-tests
        run: |
          bash .claude/hooks/test-inject-patterns.sh
          bash .claude/hooks/test-kimi-review.sh
          bash .claude/hooks/test-guard-worktree-isolation.sh

      - name: Python inject tests
        run: |
          python3 scripts/inject/test_match_triggers.py
          python3 scripts/inject/test_capture_trigger.py
          python3 scripts/inject/test_capture_from_review.py
