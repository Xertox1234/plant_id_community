name: Security Dependency Scan

on:
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Mondays at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-security:
    name: Backend Python Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit (JSON report)
        run: |
          cd backend
          pip-audit -r requirements.txt --format json --output pip-audit-report.json || true
        continue-on-error: true

      - name: Run pip-audit (fail on vulnerabilities)
        run: |
          cd backend
          # Suppressed advisories — each has no upstream fix and is not reachable through app code.
          # Revisit and drop the flag whenever a patched release ships (tracked in todo 089).
          # CVE-2026-42304 (Twisted 25.5.0): no stable fix exists (fix is RC-only 26.4.0rc2). Remove when Twisted >=26.4.0 stable releases.
          # PYSEC-2026-89  (Markdown 3.8.1): no upstream fix (OSV: all versions affected); markdown not imported by app code; DoS path unreachable.
          # PYSEC-2026-97  (nltk 3.9.4):     no upstream fix (already latest); filestring() path traversal not called by app code.
          # PYSEC-2026-597 (nltk 3.9.4):     no upstream fix (OSV last_affected=3.9.4, the latest release); percent-encoded path traversal in nltk.data.load()/find(), which app code never calls (nltk is transitive; zero nltk imports in apps/, packages/, plant_community/).
          # PYSEC-2024-277 (joblib 1.5.2):   supplier-disputed; not imported by app code.
          # PYSEC-2025-183 (PyJWT 2.13.0):   supplier-disputed; mitigated by JWT_SECRET_KEY (the SIMPLE_JWT SIGNING_KEY PyJWT signs with), validated >=50 chars fail-fast at settings import in ALL environments (settings.py:658).
          # CVE-2026-31236 (llm 0.27.1):     no upstream fix per OSV/PyPI advisory; llm is a wagtail-ai transitive dep, not imported directly by app code. Remove when a patched llm release ships.
          pip-audit -r requirements.txt \
            --ignore-vuln CVE-2026-42304 \
            --ignore-vuln PYSEC-2026-89 \
            --ignore-vuln PYSEC-2026-97 \
            --ignore-vuln PYSEC-2026-597 \
            --ignore-vuln PYSEC-2024-277 \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln CVE-2026-31236
        continue-on-error: false

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pip-audit-report
          path: backend/pip-audit-report.json
          retention-days: 30

      - name: Comment PR with vulnerabilities (if any)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Security vulnerabilities detected in Python dependencies**\n\nPlease check the pip-audit report in the workflow artifacts for details.\n\nRun locally: `cd backend && pip-audit -r requirements.txt`'
            })

  frontend-security:
    name: Frontend npm Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Run npm audit (JSON report)
        run: |
          cd web
          npm audit --json > npm-audit-report.json || true
        continue-on-error: true

      - name: Run npm audit (fail on moderate+)
        run: |
          cd web
          npm audit --audit-level=moderate
        continue-on-error: false

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: npm-audit-report
          path: web/npm-audit-report.json
          retention-days: 30

      - name: Comment PR with vulnerabilities (if any)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Security vulnerabilities detected in npm dependencies**\n\nPlease check the npm audit report in the workflow artifacts for details.\n\nRun locally: `cd web && npm audit`'
            })

  mobile-security:
    name: Flutter Dependency Security Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Python dependencies for security scanner
        run: |
          pip install --upgrade pip
          pip install PyYAML

      - name: Get Flutter dependencies
        run: |
          cd plant_community_mobile
          flutter pub get

      - name: Run Flutter security scanner
        run: |
          python scripts/check_flutter_security.py
        continue-on-error: false

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: flutter-sbom
          path: plant_community_mobile/sbom.json
          retention-days: 90

      - name: Upload Flutter outdated report (if exists)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: flutter-outdated-report
          path: plant_community_mobile/flutter-outdated.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment PR with outdated packages (if any)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Flutter dependency issues detected**\n\nPlease check the Flutter security report in the workflow artifacts for details.\n\nRun locally: `source backend/venv/bin/activate && python scripts/check_flutter_security.py`'
            })

  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [backend-security, frontend-security, mobile-security]
    if: always()

    steps:
      - name: Check scan results
        run: |
          echo "Security scan completed for all platforms"
          echo "Backend: ${{ needs.backend-security.result }}"
          echo "Frontend: ${{ needs.frontend-security.result }}"
          echo "Mobile: ${{ needs.mobile-security.result }}"

          if [[ "${{ needs.backend-security.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-security.result }}" == "failure" ]] || \
             [[ "${{ needs.mobile-security.result }}" == "failure" ]]; then
            echo "⚠️ Security vulnerabilities detected! Please review the reports."
            exit 1
          else
            echo "✅ No security vulnerabilities detected"
          fi
